<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LoveNote 💌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <style>
    :root{
      --bg1:#fff0f5;    /* lavenderblush */
      --bg2:#ffe3ed;    /* soft pink */
      --ink:#7a1b4a;    /* romantic plum */
      --ink-muted:#a5426b;
      --accent:#ff6fa9; /* rose */
      --accent-2:#ffd1dc;/* baby pink */
      --card:#ffffffcc; /* translucent white */
      --shadow: 0 10px 30px rgba(0,0,0,.12);
      --radius: 22px;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg1:#2a0f1e; --bg2:#4a1633; --ink:#ffd1dc; --ink-muted:#ffc0cb; --card:#00000066; --shadow: 0 10px 30px rgba(0,0,0,.5);
      }
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100svh; display:grid; place-items:center;
      background: radial-gradient(1200px 800px at 20% 10%, var(--bg2), transparent 60%),
                  radial-gradient(1200px 800px at 80% 90%, var(--bg1), transparent 60%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      color:var(--ink);
    }
    .wrap{
      position:relative; padding:28px;
      width:min(820px, 92vw);
    }
    .card{
      background:var(--card); backdrop-filter: blur(8px);
      border:1px solid #ffffff40; border-radius:var(--radius); box-shadow:var(--shadow);
      padding:28px 26px 22px; position:relative; overflow:hidden;
    }
    .heading{
      display:flex; align-items:center; gap:10px; margin-bottom:12px; color:var(--ink-muted);
      font-size:15px; letter-spacing:.3px; text-transform:uppercase;
    }
    .heading .heart{font-size:18px}
    .quote{
      font-size: clamp(24px, 3.2vw, 36px);
      line-height:1.25; margin:10px 0 18px; font-weight:600;
    }
    .controls{
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    }
    button{
      appearance:none; border:0; border-radius: 999px; padding:10px 16px; cursor:pointer;
      background:linear-gradient(180deg, var(--accent), #ff5c9d);
      color:white; font-weight:700; box-shadow:0 6px 20px rgba(255, 105, 155, .45);
      transition: transform .05s ease, filter .2s ease;
    }
    button:active{ transform: translateY(1px) scale(.99); }
    .ghost{
      background:transparent; color:var(--ink); border:1px solid #00000015; box-shadow:none;
    }
    .ghost:hover{ background:#ffffff40 }
    .muted{ opacity:.85 }
    .tiny{ font-size:12px; margin-left:auto; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .pill{
      background: #ffffff88; border:1px solid #ffffff55; padding:6px 10px; border-radius:999px;
      display:flex; gap:8px; align-items:center; color:var(--ink-muted); font-size:13px;
    }
    /* floating hearts */
    .hearts{ pointer-events:none; position:absolute; inset:0; overflow:hidden; z-index:0; }
    .heart-f{
      position:absolute; bottom:-40px; left:var(--x, 50%); font-size:var(--s, 16px); opacity:.55;
      animation: floatUp linear var(--d, 6s) infinite;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.15));
    }
    @keyframes floatUp{
      from{ transform: translate(-50%, 0) }
      to{ transform: translate(-50%, -120vh) }
    }
    .content{ position:relative; z-index:1; }
    .footer{
      margin-top:10px; display:flex; justify-content:space-between; align-items:center; color:var(--ink-muted); font-size:13px;
    }
    a{ color:inherit }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hearts" id="hearts"></div>
      <div class="content">
        <div class="heading"><span class="heart">💌</span> LoveNote</div>
        <div id="quote" class="quote">Loading your love note…</div>

        <div class="controls">
          <div class="row">
            <button id="newBtn">New note ✨</button>
            <button id="copyBtn" class="ghost">Copy</button>
            <button id="shareBtn" class="ghost">Share</button>
            <label class="pill">
              <input id="autoChk" type="checkbox" style="accent-color:#ff6fa9" />
              Auto-play
              <span class="muted" id="intervalLabel">(every 5s)</span>
            </label>
          </div>
          <span class="tiny muted">Powered by <a href="#" id="apiLink">your API</a></span>
        </div>
      </div>
    </div>
    <div class="footer">
      <span>Tip: press <strong>N</strong> for a new note • <strong>C</strong> to copy</span>
      <span>Made with ❤</span>
    </div>
  </div>

  <script>
    // >>>> 1) SET YOUR API URL HERE <<<<
    const API_URL = "https://random-quotes-api-sgd0.onrender.com/random-quote"; // <- change if needed

    // Cache elements
    const quoteEl = document.getElementById("quote");
    const newBtn  = document.getElementById("newBtn");
    const copyBtn = document.getElementById("copyBtn");
    const shareBtn= document.getElementById("shareBtn");
    const autoChk = document.getElementById("autoChk");
    const apiLink = document.getElementById("apiLink");
    apiLink.href = API_URL;

    // Typewriter effect for extra ✨
    async function typeText(el, text, speed=18){
      el.textContent = "";
      for (let i = 0; i < text.length; i++){
        el.textContent += text[i];
        await new Promise(r => setTimeout(r, speed));
      }
    }

    async function fetchQuote(){
      newBtn.disabled = true;
      try{
        const res = await fetch(API_URL, {cache:"no-store"});
        const data = await res.json();
        const line = (data.quote || "").trim();
        if(!line) throw new Error("Empty quote");
        await typeText(quoteEl, `“${line}”`);
        burstHearts();
      }catch(e){
        quoteEl.textContent = "Couldn’t load a love note. Try again in a moment 💔";
        console.error(e);
      }finally{
        newBtn.disabled = false;
      }
    }

    // Floating hearts generator
    function burstHearts(){
      const box = document.getElementById("hearts");
      for(let i=0;i<6;i++){
        const span = document.createElement("span");
        span.className = "heart-f";
        span.textContent = Math.random() < .5 ? "💖" : "💗";
        span.style.setProperty("--x", `${10 + Math.random()*80}%`);
        span.style.setProperty("--s", `${14 + Math.random()*18}px`);
        span.style.setProperty("--d", `${5 + Math.random()*4}s`);
        box.appendChild(span);
        setTimeout(()=> span.remove(), 9000);
      }
    }

    // Copy & Share
    copyBtn.addEventListener("click", async ()=>{
      const text = quoteEl.textContent.replace(/^“|”$/g,"");
      await navigator.clipboard.writeText(text);
      copyBtn.textContent = "Copied ✓";
      setTimeout(()=> copyBtn.textContent = "Copy", 1300);
    });

    shareBtn.addEventListener("click", async ()=>{
      const text = quoteEl.textContent.replace(/^“|”$/g,"");
      if (navigator.share){
        try{ await navigator.share({ text, title:"LoveNote 💌", url: location.href }); }catch{}
      } else {
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}%20%23LoveNote`;
        window.open(url, "_blank");
      }
    });

    // Buttons & keyboard
    newBtn.addEventListener("click", fetchQuote);
    document.addEventListener("keydown", (e)=>{
      if (e.key.toLowerCase() === "n") fetchQuote();
      if (e.key.toLowerCase() === "c") copyBtn.click();
    });

    // Autoplay
    let timer = null;
    autoChk.addEventListener("change", ()=>{
      if (autoChk.checked){
        fetchQuote();
        timer = setInterval(fetchQuote, 5000);
      } else {
        clearInterval(timer);
      }
    });

    // Load first quote
    fetchQuote();
  </script>
</body>
</html>
